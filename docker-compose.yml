services:
  gopot:
    build: .
    image: gopot:latest
    container_name: gopot
    restart: always
    ports:
      - "22:2223"
    volumes:
      - ./gopot.toml:/app/gopot.toml:ro
      - ./host_key:/app/host_key:ro
      - gopot-data:/app
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "128M"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gopot-data:
